name: Generar muebles.json (polígonos exactos)

on:
  workflow_dispatch:
  push:
    paths:
      - "UBICACION MEDICAMENTOS FARMACIA 2026 (1).xlsx"
      - "images/**"
      - "tools/generar_muebles_json.py"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pillow opencv-python-headless scikit-learn pytesseract

      - name: Generar muebles.json
        run: |
          python tools/generar_muebles_json.py

      - name: Commit y push si hay cambios
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/muebles.json data/reporte_muebles.json
            git commit -m "Actualizar muebles.json (polígonos)"
            git push
          else
            echo "Sin cambios."
          fi
